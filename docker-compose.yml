services:
  db:
    image: mariadb:11
    container_name: crypto-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-backend
    ports:
      - "5000:5000"
    environment:
      Database__Host: db
      Database__Port: "3306"
      Database__Name: ${DATABASE_NAME}
      Database__User: ${DATABASE_USER}
      Database__Password: ${DATABASE_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS}
      Brevo__ApiKey: ${BREVO_API_KEY}
      Brevo__Sender: ${BREVO_SENDER}
      Binance__BaseUrl: ${BINANCE_API_URL}
      Stripe__SecretKey: ${Stripe__SecretKey}
      Stripe__PublishableKey: ${Stripe__PublishableKey}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      Ollama__Model: ${OLLAMA_MODEL:-nemotron-3-super:cloud}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
