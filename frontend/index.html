<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CryptoTracker — Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link href="style.css" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "on-error-container": "#ffdad6",
                    "secondary-fixed-dim": "#ffb3b2",
                    "on-background": "#dee1f7",
                    "surface-container-low": "#161b2b",
                    "primary-container": "#00ff88",
                    "surface-container-highest": "#303445",
                    "on-tertiary-fixed": "#261a00",
                    "inverse-on-surface": "#2b3040",
                    "secondary-fixed": "#ffdad9",
                    "on-primary-container": "#007139",
                    "on-error": "#690005",
                    "outline-variant": "#3b4b3d",
                    "inverse-surface": "#dee1f7",
                    "surface": "#0e1322",
                    "on-secondary-fixed-variant": "#920020",
                    "on-secondary-fixed": "#410008",
                    "on-tertiary-container": "#7d5d00",
                    "surface-bright": "#343949",
                    "primary-fixed-dim": "#00e479",
                    "surface-tint": "#00e479",
                    "surface-container-high": "#25293a",
                    "on-primary": "#003919",
                    "primary-fixed": "#60ff99",
                    "tertiary-container": "#ffda8d",
                    "surface-container": "#1a1f2f",
                    "on-secondary-container": "#ffc2c1",
                    "tertiary-fixed-dim": "#fabd00",
                    "on-surface-variant": "#b9cbb9",
                    "on-tertiary": "#3f2e00",
                    "on-tertiary-fixed-variant": "#5b4300",
                    "primary": "#f1ffef",
                    "on-primary-fixed": "#00210c",
                    "surface-container-lowest": "#090d1d",
                    "secondary-container": "#b5032a",
                    "surface-dim": "#0e1322",
                    "surface-variant": "#303445",
                    "error": "#ffb4ab",
                    "tertiary-fixed": "#ffdf9e",
                    "error-container": "#93000a",
                    "on-primary-fixed-variant": "#005228",
                    "on-secondary": "#680013",
                    "secondary": "#ffb3b2",
                    "tertiary": "#fffaf8",
                    "outline": "#849585",
                    "on-surface": "#dee1f7",
                    "inverse-primary": "#006d37",
                    "background": "#0e1322"
                },
                "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
                "spacing": {
                    "unit": "4px",
                    "sm": "8px",
                    "xl": "40px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "gutter": "20px",
                    "lg": "24px",
                    "margin-desktop": "32px",
                    "xs": "4px"
                },
                "fontFamily": {
                    "headline-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "mono-data": ["Inter"]
                },
                "fontSize": {
                    "headline-lg": ["32px", {"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"600"}],
                    "headline-sm": ["20px", {"lineHeight":"28px","fontWeight":"600"}],
                    "body-md": ["16px", {"lineHeight":"24px","fontWeight":"400"}],
                    "headline-md": ["24px", {"lineHeight":"32px","fontWeight":"600"}],
                    "body-lg": ["18px", {"lineHeight":"28px","fontWeight":"400"}],
                    "label-md": ["12px", {"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"600"}],
                    "body-sm": ["14px", {"lineHeight":"20px","fontWeight":"400"}],
                    "display-lg": ["48px", {"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"700"}],
                    "mono-data": ["14px", {"lineHeight":"20px","fontWeight":"500"}]
                }
            }
        }
    }
</script>
</head>
<body class="bg-background text-on-surface overflow-x-hidden">

<main class="lg:pl-64 pt-16 min-h-screen">

<!-- Health Bar -->
<div id="health-bar" class="w-full bg-surface-container-high px-margin-desktop py-sm flex justify-between items-center border-b border-outline-variant/10">
    <div class="flex items-center gap-lg">
        <div class="flex items-center gap-sm">
            <span class="text-primary-fixed-dim font-bold text-label-md font-label-md">CRYPTO-TRACKER</span>
            <span class="text-on-surface-variant/40">|</span>
            <div class="flex items-center gap-xs">
                <span id="db-status-dot" class="status-dot-connecting"></span>
                <span id="db-status-text" class="text-body-sm font-body-sm text-on-surface-variant">Connecting...</span>
            </div>
        </div>
        <div class="hidden md:flex gap-md border-l border-outline-variant/20 pl-lg">
            <div class="flex items-center gap-xs text-body-sm font-body-sm">
                <span class="text-on-surface-variant">BTC:</span>
                <span id="ticker-btc" class="text-primary-fixed font-mono-data text-mono-data">---</span>
            </div>
            <div class="flex items-center gap-xs text-body-sm font-body-sm">
                <span class="text-on-surface-variant">ETH:</span>
                <span id="ticker-eth" class="text-primary-fixed font-mono-data text-mono-data">---</span>
            </div>
        </div>
    </div>
    <div class="flex items-center gap-sm text-body-sm font-body-sm text-on-surface-variant">
        <span id="pro-badge-container" class="hidden items-center gap-xs mr-md">
            <span class="material-symbols-outlined text-[#FFD700] text-md" style="font-variation-settings:'FILL'1">verified</span>
            <span class="text-[#FFD700] font-label-md text-label-md font-bold">PRO</span>
            <span id="pro-days-remaining" class="text-on-surface-variant text-body-sm font-body-sm"></span>
        </span>
        <span class="material-symbols-outlined text-base">sync</span>
        <span id="cache-age-text">Checking...</span>
    </div>
</div>

<div class="p-margin-desktop space-y-lg">

<!-- Hero Grid: Table + Chart -->
<div class="grid grid-cols-1 xl:grid-cols-10 gap-lg">

<!-- Section 1: Live Prices Table -->
<div class="xl:col-span-6 bg-surface-container-low rounded-xl border border-outline-variant/20 overflow-hidden flex flex-col">
    <div class="px-lg py-md border-b border-outline-variant/10 flex justify-between items-center">
        <h2 class="font-headline-sm text-headline-sm">Live Markets</h2>
        <button class="text-primary-fixed-dim font-label-md text-label-md flex items-center gap-xs hover:underline" onclick="window.location.href='market-explorer.html'">
            View All <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-on-surface-variant bg-surface-container/30">
                    <th class="px-lg py-sm font-label-md text-label-md">Asset</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">Price USD</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">Price EUR</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">24h Change</th>
                </tr>
            </thead>
            <tbody id="price-table-body" class="divide-y divide-outline-variant/10"></tbody>
        </table>
    </div>
</div>

<!-- Section 2: Price Chart -->
<div class="xl:col-span-4 bg-surface-container-low rounded-xl border border-outline-variant/20 p-lg flex flex-col gap-lg">
    <div class="flex flex-col gap-sm">
        <div class="flex justify-between items-start">
            <div>
                <select id="chart-crypto-select" class="bg-transparent border-none text-headline-sm font-headline-sm focus:ring-0 cursor-pointer p-0 pr-8 outline-none" onchange="onCryptoChange()">
                    <option value="bitcoin">Bitcoin (BTC)</option>
                    <option value="ethereum">Ethereum (ETH)</option>
                    <option value="cardano">Cardano (ADA)</option>
                    <option value="dogecoin">Dogecoin (DOGE)</option>
                    <option value="solana">Solana (SOL)</option>
                    <option value="ripple">Ripple (XRP)</option>
                </select>
                <p id="chart-current-price" class="text-display-lg font-display-lg text-primary-fixed mt-2">---</p>
            </div>
            <div class="flex bg-surface-container-high p-1 rounded-lg" id="period-buttons">
                <button class="period-btn px-3 py-1 text-label-md font-label-md bg-surface-container-highest text-primary-fixed-dim rounded-md active" data-days="7" onclick="onPeriodChange(7, this)">7D</button>
                <button class="px-3 py-1 text-label-md font-label-md text-on-surface-variant hover:text-on-surface" data-days="30" onclick="onPeriodChange(30, this)">30D</button>
                <button class="px-3 py-1 text-label-md font-label-md text-on-surface-variant hover:text-on-surface" data-days="90" onclick="onPeriodChange(90, this)">90D</button>
            </div>
        </div>
    </div>
    <div class="chart-container flex-1 relative bg-surface-container-highest/20 rounded-lg overflow-hidden border border-outline-variant/5">
        <canvas id="price-chart-canvas"></canvas>
        <div id="chart-placeholder" class="absolute inset-0 flex items-center justify-center text-on-surface-variant text-body-md">
            Select a cryptocurrency
        </div>
    </div>
    <div class="grid grid-cols-3 gap-md" id="chart-stats">
        <div class="p-md bg-surface-container-highest/40 rounded-lg">
            <p class="text-label-md font-label-md text-on-surface-variant">Low</p>
            <p id="stat-low" class="text-body-md font-body-md font-bold">---</p>
        </div>
        <div class="p-md bg-surface-container-highest/40 rounded-lg">
            <p class="text-label-md font-label-md text-on-surface-variant">High</p>
            <p id="stat-high" class="text-body-md font-body-md font-bold">---</p>
        </div>
        <div class="p-md bg-surface-container-highest/40 rounded-lg">
            <p class="text-label-md font-label-md text-on-surface-variant">Volume</p>
            <p id="stat-range" class="text-body-md font-body-md font-bold">---</p>
        </div>
    </div>
</div>
</div>

<!-- Section 3: Alerts Panel -->
<section id="alerts-section" class="bg-surface-container-low rounded-xl border border-outline-variant/20 overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant/10">
        <h2 class="font-headline-sm text-headline-sm">Market Price Alerts</h2>
    </div>
    <div class="flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x divide-outline-variant/10">

        <!-- Alert Form -->
        <div class="w-full md:w-1/3 p-lg space-y-md">
            <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Create New Alert</h3>
            <div class="space-y-sm">
                <label class="block text-body-sm font-body-sm text-on-surface-variant" for="alert-crypto">Asset</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-md">search</span>
                    <select id="alert-crypto" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg pl-10 pr-3 py-2 text-body-md font-body-md focus:ring-1 focus:ring-primary-fixed-dim outline-none">
                        <option value="bitcoin">Bitcoin (BTC)</option>
                        <option value="ethereum">Ethereum (ETH)</option>
                        <option value="cardano">Cardano (ADA)</option>
                        <option value="dogecoin">Dogecoin (DOGE)</option>
                        <option value="solana">Solana (SOL)</option>
                        <option value="ripple">Ripple (XRP)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-md">
                <div class="space-y-sm">
                    <label class="block text-body-sm font-body-sm text-on-surface-variant" for="alert-condition">Condition</label>
                    <select id="alert-condition" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 text-body-md font-body-md focus:ring-1 focus:ring-primary-fixed-dim outline-none">
                        <option value="above">Price Above</option>
                        <option value="below">Price Below</option>
                    </select>
                </div>
                <div class="space-y-sm">
                    <label class="block text-body-sm font-body-sm text-on-surface-variant" for="alert-threshold">Price (USD)</label>
                    <input id="alert-threshold" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 text-body-md font-body-md focus:ring-1 focus:ring-primary-fixed-dim outline-none" placeholder="50000" type="number" step="0.01"/>
                </div>
            </div>
            <p id="alert-form-error" class="text-error text-body-sm font-body-sm hidden"></p>
            <button
                id="create-alert-btn"
                class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 rounded-lg hover:brightness-110 transition-all font-bold"
                onclick="onCreateAlert()">
                Set Price Alert
            </button>
        </div>

        <!-- Alert List -->
        <div class="w-full md:w-2/3 p-lg flex flex-col">
            <div class="flex justify-between items-center mb-md">
                <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" id="alerts-count-title">Active Alerts</h3>
                <button class="text-error font-label-md text-label-md hover:underline hidden" id="clear-all-btn" onclick="onClearAllAlerts()">Clear All</button>
            </div>
            <div class="flex-1 overflow-y-auto max-h-[350px] space-y-sm pr-sm" id="alerts-list"></div>
        </div>
    </div>
</section>

</div>
</main>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="layout.js?v=2"></script>
<script src="main.js?v=2"></script>
<script>
if (!isAuthenticated()) window.location.href = 'login.html';
initLayout('dashboard');

(async function loadProBadge() {
    try {
        const res = await api('/api/subscription/status');
        const data = await res.json();
        if (data.isPro) {
            const badge = document.getElementById('pro-badge-container');
            const daysEl = document.getElementById('pro-days-remaining');
            badge.classList.remove('hidden');
            badge.classList.add('flex');
            if (data.status === 'cancelled') {
                daysEl.textContent = '— cancels at period end';
            } else if (data.daysRemaining !== null && data.daysRemaining > 0) {
                daysEl.textContent = data.daysRemaining === 1 ? '— 1 day left' : `— ${data.daysRemaining} days left`;
            } else {
                daysEl.textContent = '— expires today';
            }
        }
    } catch (e) { /* not pro or error */ }
})();
</script>
</body>
</html>
