<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio | CryptoTracker Terminal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { "colors": { "on-error-container":"#ffdad6","secondary-fixed-dim":"#ffb3b2","on-background":"#dee1f7","surface-container-low":"#161b2b","primary-container":"#00ff88","surface-container-highest":"#303445","on-tertiary-fixed":"#261a00","inverse-on-surface":"#2b3040","secondary-fixed":"#ffdad9","on-primary-container":"#007139","on-error":"#690005","outline-variant":"#3b4b3d","inverse-surface":"#dee1f7","surface":"#0e1322","on-secondary-fixed-variant":"#920020","on-secondary-fixed":"#410008","on-tertiary-container":"#7d5d00","surface-bright":"#343949","primary-fixed-dim":"#00e479","surface-tint":"#00e479","surface-container-high":"#25293a","on-primary":"#003919","primary-fixed":"#60ff99","tertiary-container":"#ffda8d","surface-container":"#1a1f2f","on-secondary-container":"#ffc2c1","tertiary-fixed-dim":"#fabd00","on-surface-variant":"#b9cbb9","on-tertiary":"#3f2e00","on-tertiary-fixed-variant":"#5b4300","primary":"#f1ffef","on-primary-fixed":"#00210c","surface-container-lowest":"#090d1d","secondary-container":"#b5032a","surface-dim":"#0e1322","surface-variant":"#303445","error":"#ffb4ab","tertiary-fixed":"#ffdf9e","error-container":"#93000a","on-primary-fixed-variant":"#005228","on-secondary":"#680013","secondary":"#ffb3b2","tertiary":"#fffaf8","outline":"#849585","on-surface":"#dee1f7","inverse-primary":"#006d37","background":"#0e1322" }, "borderRadius": { "DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px" }, "spacing": { "unit":"4px","sm":"8px","xl":"40px","margin-mobile":"16px","md":"16px","gutter":"20px","lg":"24px","margin-desktop":"32px","xs":"4px" }, "fontFamily": { "headline-lg":["Inter"],"headline-sm":["Inter"],"body-md":["Inter"],"headline-md":["Inter"],"body-lg":["Inter"],"label-md":["Inter"],"body-sm":["Inter"],"display-lg":["Inter"],"mono-data":["Inter"] }, "fontSize": { "headline-lg":["32px",{"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"600"}],"headline-sm":["20px",{"lineHeight":"28px","fontWeight":"600"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"32px","fontWeight":"600"}],"body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],"label-md":["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"600"}],"body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],"display-lg":["48px",{"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"700"}],"mono-data":["14px",{"lineHeight":"20px","fontWeight":"500"}] } } } }
</script>
</head>
<body class="bg-background text-on-surface overflow-x-hidden">

<main class="lg:pl-64 pt-16 min-h-screen">
<div class="p-margin-desktop space-y-lg">

<div class="bg-surface-container-low rounded-xl border border-outline-variant/20 p-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-lg">
    <div>
        <p class="text-on-surface-variant text-body-md">Total Portfolio Balance</p>
        <p class="text-display-lg font-display-lg text-primary-fixed" id="portfolio-balance">$0.00</p>
        <div id="portfolio-change-row" class="flex items-center gap-sm mt-sm hidden">
            <span class="material-symbols-outlined text-sm" id="portfolio-change-arrow">arrow_upward</span>
            <span class="font-mono-data text-mono-data" id="portfolio-change-text">---</span>
            <span class="text-on-surface-variant text-body-sm font-body-sm">Past 24 hours</span>
        </div>
    </div>
    <div class="flex gap-md">
        <button id="btn-buy" class="bg-primary-container text-on-primary-container font-label-md text-label-md px-lg py-sm rounded-lg hover:brightness-110 transition-all font-bold" disabled>Buy</button>
        <button id="btn-send" class="bg-surface-container-highest text-on-surface font-label-md text-label-md px-lg py-sm rounded-lg hover:bg-surface-container-high transition-all" disabled>Send</button>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-lg">

<div class="bg-surface-container-low rounded-xl border border-outline-variant/20 p-lg">
    <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-lg">Asset Allocation</h3>
    <div class="flex items-center gap-lg">
        <div class="donut-chart" id="donut-chart-el"></div>
        <div class="flex-1 space-y-md" id="allocation-legends"></div>
    </div>
</div>

<div class="bg-surface-container-low rounded-xl border border-outline-variant/20 p-lg">
    <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-lg">Quick Add</h3>
    <div class="space-y-md">
        <div class="space-y-sm">
            <label class="block text-body-sm font-body-sm text-on-surface-variant" for="holding-crypto">Asset</label>
            <select id="holding-crypto" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 text-body-md font-body-md focus:ring-1 focus:ring-primary-fixed-dim outline-none">
                <option value="bitcoin">Bitcoin (BTC)</option>
                <option value="ethereum">Ethereum (ETH)</option>
                <option value="cardano">Cardano (ADA)</option>
                <option value="dogecoin">Dogecoin (DOGE)</option>
                <option value="solana">Solana (SOL)</option>
                <option value="ripple">Ripple (XRP)</option>
            </select>
        </div>
        <div class="space-y-sm">
            <label class="block text-body-sm font-body-sm text-on-surface-variant" for="holding-amount">Amount</label>
            <input id="holding-amount" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 text-body-md font-body-md focus:ring-1 focus:ring-primary-fixed-dim outline-none" placeholder="0.5" type="number" step="0.0001" min="0"/>
        </div>
        <p id="holding-error" class="text-error text-body-sm font-body-sm hidden"></p>
        <button id="btn-add-holding" class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 rounded-lg hover:brightness-110 transition-all font-bold" onclick="onAddHolding()">Add / Update Holding</button>
    </div>
</div>

<div class="bg-surface-container-low rounded-xl border border-outline-variant/20 p-lg">
    <h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-lg">Summary</h3>
    <div class="space-y-md">
        <div class="flex justify-between"><span class="text-body-sm font-body-sm text-on-surface-variant">Total Holdings</span><span class="font-mono-data text-mono-data" id="summary-count">0</span></div>
        <div class="flex justify-between"><span class="text-body-sm font-body-sm text-on-surface-variant">Best Performer</span><span class="font-mono-data text-mono-data text-primary-fixed-dim" id="summary-best">---</span></div>
        <div class="flex justify-between"><span class="text-body-sm font-body-sm text-on-surface-variant">Worst Performer</span><span class="font-mono-data text-mono-data text-error" id="summary-worst">---</span></div>
    </div>
</div>
</div>

<div class="bg-surface-container-low rounded-xl border border-outline-variant/20 overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant/10 flex justify-between items-center">
        <h2 class="font-headline-sm text-headline-sm">Your Assets</h2>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-on-surface-variant bg-surface-container/30">
                    <th class="px-lg py-sm font-label-md text-label-md">Coin</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">Balance</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">Price</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">Value (USD)</th>
                    <th class="px-lg py-sm font-label-md text-label-md text-right">24h</th>
                    <th class="px-lg py-sm font-label-md text-label-md w-16"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant/10" id="portfolio-assets"></tbody>
        </table>
    </div>
</div>

</div>
</main>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script>
if (!isAuthenticated()) window.location.href = 'login.html';

const cryptoIcons = {bitcoin:'currency_bitcoin',ethereum:'eco',cardano:'token',dogecoin:'pets',solana:'circle',ripple:'water_drop'};
const cryptoNames = {bitcoin:'Bitcoin',ethereum:'Ethereum',cardano:'Cardano',dogecoin:'Dogecoin',solana:'Solana',ripple:'Ripple'};
const cryptoSymbols = {bitcoin:'BTC',ethereum:'ETH',cardano:'ADA',dogecoin:'DOGE',solana:'SOL',ripple:'XRP'};
const cryptoColors = {bitcoin:'#00ff88',ethereum:'#60ff99',cardano:'#3b82f6',dogecoin:'#ffc107',solana:'#a78bfa',ripple:'#38bdf8'};

function formatPrice(p) { return p>=1 ? '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '$'+p.toFixed(6); }
function formatPercent(pct) { return (pct>=0?'+':'')+pct.toFixed(2)+'%'; }

function showToast(m, isErr) {
    const c = document.getElementById('toast-container') || (() => { const d=document.createElement('div'); d.id='toast-container'; document.body.appendChild(d); return d; })();
    const t = document.createElement('div');
    t.className = 'error-toast';
    t.textContent = m;
    if (!isErr) t.style.background = '#007139';
    c.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

async function fetchPortfolio() {
    try {
        const res = await api('/api/portfolio');
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        renderPortfolio(data);
    } catch(err) {
        console.error('fetchPortfolio failed:', err);
        document.getElementById('portfolio-assets').innerHTML = '<tr><td colspan="6" class="px-lg py-xl text-center text-on-surface-variant">Failed to load portfolio</td></tr>';
    }
}

function renderPortfolio(data) {
    const balance = data.totalValueUsd || 0;
    document.getElementById('portfolio-balance').textContent = formatPrice(balance);

    const holdings = data.holdings || [];
    const tbody = document.getElementById('portfolio-assets');

    if (holdings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-lg py-xl text-center text-on-surface-variant">No holdings yet. Add your first asset above.</td></tr>';
        renderDonut([]);
        document.getElementById('summary-count').textContent = '0';
        document.getElementById('summary-best').textContent = '---';
        document.getElementById('summary-worst').textContent = '---';
        document.getElementById('portfolio-change-row').classList.add('hidden');
        return;
    }

    document.getElementById('summary-count').textContent = holdings.length;

    let best = null, worst = null;
    holdings.forEach(h => {
        if (h.change24hPercent != null) {
            if (!best || h.change24hPercent > best.change24hPercent) best = h;
            if (!worst || h.change24hPercent < worst.change24hPercent) worst = h;
        }
    });
    document.getElementById('summary-best').textContent = best ? best.symbol + ' ' + formatPercent(best.change24hPercent) : '---';
    document.getElementById('summary-worst').textContent = worst ? worst.symbol + ' ' + formatPercent(worst.change24hPercent) : '---';

    if (holdings.some(h => h.change24hPercent != null)) {
        document.getElementById('portfolio-change-row').classList.remove('hidden');
        const avgChange = holdings.reduce((s,h) => s + (h.change24hPercent||0), 0) / holdings.length;
        document.getElementById('portfolio-change-text').textContent = formatPercent(avgChange);
        document.getElementById('portfolio-change-text').className = 'font-mono-data text-mono-data ' + (avgChange >= 0 ? 'text-primary-fixed-dim' : 'text-error');
        document.getElementById('portfolio-change-arrow').textContent = avgChange >= 0 ? 'arrow_upward' : 'arrow_downward';
    }

    tbody.innerHTML = '';
    holdings.forEach(h => {
        const icon = cryptoIcons[h.cryptoId] || 'currency_bitcoin';
        const changeCls = (h.change24hPercent||0) >= 0 ? 'text-primary-fixed-dim' : 'text-error';
        const arrow = (h.change24hPercent||0) >= 0 ? 'arrow_upward' : 'arrow_downward';

        tbody.innerHTML += `
        <tr class="hover:bg-surface-container-highest/30 transition-colors cursor-pointer" onclick="window.location.href='crypto-detail.html?id=${h.cryptoId}'">
            <td class="px-lg py-md">
                <div class="flex items-center gap-md">
                    <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border border-outline-variant/20">
                        <span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings:'FILL'1">${icon}</span>
                    </div>
                    <div>
                        <div class="font-bold text-body-md font-body-md">${h.name}</div>
                        <div class="text-on-surface-variant text-label-md font-label-md">${h.symbol}</div>
                    </div>
                </div>
            </td>
            <td class="px-lg py-md text-right font-mono-data text-mono-data">${h.amount.toLocaleString('en-US',{maximumFractionDigits:8})} ${h.symbol}</td>
            <td class="px-lg py-md text-right font-mono-data text-mono-data">${h.priceUsd != null ? formatPrice(h.priceUsd) : '---'}</td>
            <td class="px-lg py-md text-right font-mono-data text-mono-data">${h.valueUsd != null ? formatPrice(h.valueUsd) : '$0.00'}</td>
            <td class="px-lg py-md text-right">
                <span class="${changeCls} flex items-center justify-end gap-xs font-mono-data text-mono-data">
                    ${h.change24hPercent != null ? '<span class="material-symbols-outlined text-sm">'+arrow+'</span> '+formatPercent(h.change24hPercent) : '---'}
                </span>
            </td>
            <td class="px-lg py-md">
                <button onclick="event.stopPropagation();onDeleteHolding('${h.cryptoId}')" class="p-2 hover:bg-error-container/20 rounded-full text-error transition-colors">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </td>
        </tr>`;
    });

    renderDonut(holdings);
}

function renderDonut(holdings) {
    const el = document.getElementById('donut-chart-el');
    const legends = document.getElementById('allocation-legends');
    if (holdings.length === 0) {
        el.style.background = 'conic-gradient(#303445 0% 100%)';
        legends.innerHTML = '<div class="text-on-surface-variant text-body-sm">No data</div>';
        return;
    }

    let gradient = '';
    let cumulative = 0;
    const colorKeys = ['#00ff88','#60ff99','#a78bfa','#ffc107','#3b82f6','#ff4757'];
    legends.innerHTML = '';

    holdings.forEach((h, i) => {
        const pct = h.allocationPercent || 0;
        if (pct <= 0) return;
        gradient += `${colorKeys[i%colorKeys.length]} ${cumulative}% ${cumulative+pct}%, `;
        cumulative += pct;
        legends.innerHTML += `<div class="flex items-center justify-between">
            <div class="flex items-center gap-sm"><div class="w-3 h-3 rounded-full" style="background:${colorKeys[i%colorKeys.length]}"></div><span class="text-body-sm font-body-sm">${h.symbol}</span></div>
            <span class="font-mono-data text-mono-data">${pct.toFixed(1)}%</span></div>`;
    });
    el.style.background = 'conic-gradient(' + gradient.slice(0,-2) + ')';
}

async function onAddHolding() {
    const cryptoId = document.getElementById('holding-crypto').value;
    const amount = parseFloat(document.getElementById('holding-amount').value);
    const errEl = document.getElementById('holding-error');
    errEl.classList.add('hidden');

    if (isNaN(amount) || amount < 0) {
        errEl.textContent = 'Enter a valid amount';
        errEl.classList.remove('hidden');
        return;
    }

    try {
        const res = await api('/api/portfolio', { method:'POST', body:{cryptoId, amount} });
        if (!res.ok) { const e=await res.json(); errEl.textContent=e.error||'Failed'; errEl.classList.remove('hidden'); return; }
        document.getElementById('holding-amount').value = '';
        showToast('Holding updated', false);
        fetchPortfolio();
    } catch(err) {
        errEl.textContent = 'Network error';
        errEl.classList.remove('hidden');
    }
}

async function onDeleteHolding(cryptoId) {
    try {
        await api('/api/portfolio/' + cryptoId, { method:'DELETE' });
        showToast('Holding removed', false);
        fetchPortfolio();
    } catch(err) { showToast('Failed to remove holding', true); }
}

document.addEventListener('DOMContentLoaded', () => {
    initLayout('portfolio');
    fetchPortfolio();
    setInterval(fetchPortfolio, 60000);
});
</script>
</body>
</html>
