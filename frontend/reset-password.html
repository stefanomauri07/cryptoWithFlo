<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password | CryptoTracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-lowest":"#090d1d","surface-container":"#1a1f2f","primary-container":"#00ff88","on-background":"#dee1f7","on-surface-variant":"#b9cbb9","surface-container-low":"#161b2b","surface-dim":"#0e1322","surface":"#0e1322","surface-container-highest":"#303445","on-error":"#690005","error-container":"#93000a","primary-fixed":"#60ff99","on-primary-container":"#007139","surface-container-high":"#25293a","on-surface":"#dee1f7","outline-variant":"#3b4b3d","outline":"#849585","on-primary":"#003919","error":"#ffb4ab","primary-fixed-dim":"#00e479","background":"#0e1322"
                },
                "borderRadius":{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
                "spacing":{"gutter":"20px","sm":"8px","xl":"40px","lg":"24px","md":"16px","xs":"4px","margin-desktop":"32px","unit":"4px","margin-mobile":"16px"},
                "fontFamily":{"headline-sm":["Inter"],"headline-lg":["Inter"],"body-md":["Inter"],"headline-md":["Inter"],"body-lg":["Inter"],"body-sm":["Inter"],"label-md":["Inter"]},
                "fontSize":{"headline-sm":["20px",{"lineHeight":"28px","fontWeight":"600"}],"headline-lg":["32px",{"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"600"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"32px","fontWeight":"600"}],"body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],"body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],"label-md":["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"600"}]}
            }
        }
    }
</script>
<style>.bg-gradient-main{background:radial-gradient(circle at 0% 0%,#161b2b 0%,#0e1322 100%);}</style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<main class="min-h-screen flex flex-col md:flex-row bg-gradient-main">

<section class="hidden md:flex md:w-1/2 relative flex-col justify-between p-xl overflow-hidden bg-surface-container-lowest">
    <div class="absolute top-[-20%] left-[-20%] w-[80%] h-[80%] bg-primary-container/10 rounded-full blur-[120px]"></div>
    <div class="relative z-10 mt-xl">
        <h2 class="font-headline-lg text-headline-lg text-on-surface mb-md">Account Recovery</h2>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">Secure your account with email verification. We'll send you a reset code.</p>
    </div>
</section>

<section class="w-full md:w-1/2 flex items-center justify-center p-gutter relative">
    <div class="md:hidden absolute top-0 left-0 w-full h-full bg-surface-container-lowest z-0"></div>
    <div class="w-full max-w-[440px] z-10">

        <div class="mb-xl">
            <a href="login.html" class="flex items-center gap-sm text-on-surface-variant hover:text-on-surface transition-colors mb-lg font-label-md text-label-md">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span> Back to Sign In
            </a>
        </div>

        <!-- Step 1: Request reset -->
        <div id="step-1">
            <div class="mb-xl">
                <h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Reset Password</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Enter your email and we'll send you a reset code.</p>
            </div>
            <div id="reset-error" class="hidden bg-error-container/30 text-error font-body-sm text-body-sm px-lg py-md rounded-lg mb-md"></div>
            <div id="reset-success" class="hidden bg-primary-container/10 text-primary-fixed-dim font-body-sm text-body-sm px-lg py-md rounded-lg mb-md"></div>
            <form class="space-y-lg" onsubmit="handleForgotPassword(event)">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-md px-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container" id="email" placeholder="name@company.com" required type="email"/>
                </div>
                <button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-md rounded-lg shadow-[0_0_20px_rgba(0,255,136,0.2)] hover:brightness-110 active:scale-[0.98] transition-all" type="submit" id="reset-btn">Send Reset Code</button>
            </form>
        </div>

        <!-- Step 2: Enter OTP + new password -->
        <div id="step-2" class="hidden">
            <div class="mb-xl">
                <h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Enter Reset Code</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Enter the code sent to <strong id="otp-email" class="text-primary-fixed-dim"></strong></p>
            </div>
            <div id="otp-error" class="hidden bg-error-container/30 text-error font-body-sm text-body-sm px-lg py-md rounded-lg mb-md"></div>
            <div id="otp-success" class="hidden bg-primary-container/10 text-primary-fixed-dim font-body-sm text-body-sm px-lg py-md rounded-lg mb-md"></div>
            <form class="space-y-lg" onsubmit="handleResetPassword(event)">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="otp-code">Reset Code</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-md px-md text-on-surface text-center text-2xl tracking-[12px] font-mono focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container" id="otp-code" maxlength="6" placeholder="000000" required type="text"/>
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="new-password">New Password</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-md px-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container" id="new-password" placeholder="Min 6 characters" required type="password" minlength="6"/>
                </div>
                <button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-md rounded-lg shadow-[0_0_20px_rgba(0,255,136,0.2)] hover:brightness-110 active:scale-[0.98] transition-all" type="submit" id="otp-btn">Reset Password</button>
            </form>
        </div>
    </div>
</section>
</main>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let resetEmail = '';

async function handleForgotPassword(e) {
    e.preventDefault();
    const btn = document.getElementById('reset-btn');
    const errorEl = document.getElementById('reset-error');
    const successEl = document.getElementById('reset-success');
    const email = document.getElementById('email').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
    errorEl.classList.add('hidden');

    try {
        await forgotPassword(email);
        resetEmail = email;
        document.getElementById('otp-email').textContent = email;
        successEl.textContent = 'Reset code sent! Check your email.';
        successEl.classList.remove('hidden');
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }

    btn.disabled = false;
    btn.textContent = 'Send Reset Code';
}

async function handleResetPassword(e) {
    e.preventDefault();
    const btn = document.getElementById('otp-btn');
    const errorEl = document.getElementById('otp-error');
    const successEl = document.getElementById('otp-success');
    const code = document.getElementById('otp-code').value;
    const newPassword = document.getElementById('new-password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
    errorEl.classList.add('hidden');

    try {
        await resetPassword(resetEmail, code, newPassword);
        successEl.textContent = 'Password reset successful! Redirecting to login...';
        successEl.classList.remove('hidden');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
    }
}
</script>
</body>
</html>
